version: 2

project_name: termbook

before:
  hooks:
    - go mod tidy

builds:
  - id: termbook
    main: ./cmd/termbook
    binary: termbook
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: termbook
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: tiulpin
    name: termbook
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    See the [README](https://github.com/tiulpin/termbook#readme) for install
    and quickstart. Live galleries: <https://tiulpin.github.io/termbook-examples/>.

brews:
  - name: termbook
    repository:
      owner: tiulpin
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/tiulpin/termbook"
    description: "Beautiful, browsable reference pages for your CLI"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    test: |
      assert_match "termbook", shell_output("#{bin}/termbook --version")
    install: |
      bin.install "termbook"
