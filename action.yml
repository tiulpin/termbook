name: termbook
description: Build a termbook gallery, or diff committed captures against fresh ones.
branding:
  icon: terminal
  color: gray-dark

inputs:
  mode:
    description: '"build" renders gallery.html. "diff" re-records every screen and compares against the captures committed at git HEAD.'
    default: build
    required: false
  version:
    description: |
      termbook version to install. "latest" picks the most recent release;
      a tag like "v0.2.0" pins; "source" builds from cmd/termbook in the
      checked-out repo.
    default: latest
    required: false
  source-path:
    description: Path to cmd/termbook when version=source. Relative to the workflow's working directory.
    default: ./cmd/termbook
    required: false
  output:
    description: Path to write the generated gallery HTML to (build mode).
    default: gallery.html
    required: false
  only:
    description: Render only the screen with this id (build mode).
    required: false
  working-directory:
    description: Directory containing .termbook/termbook.yml.
    default: .
    required: false
  baseline:
    description: Directory of <id>.ansi files to diff against (diff mode). Mutually exclusive with baseline-ref.
    required: false
  baseline-ref:
    description: Git ref to diff against (e.g. main). Defaults to HEAD. Use the PR base ref for "what changed in this PR" workflows.
    required: false
  report-md:
    description: Markdown report path (diff mode). Designed for `gh pr comment --body-file`.
    default: termbook-diff.md
    required: false
  report-html:
    description: Optional HTML report path (diff mode). Empty disables.
    default: ''
    required: false
  fail-on-change:
    description: When "true" (default), diff mode exits non-zero on any change. Set to "false" to keep going so a later step can post the report.
    default: 'true'
    required: false

outputs:
  output:
    description: Path of the generated gallery HTML (build mode).
    value: ${{ steps.build.outputs.path }}
  report-md:
    description: Path of the Markdown diff report (diff mode).
    value: ${{ steps.diff.outputs.report-md }}
  report-html:
    description: Path of the HTML diff report (diff mode), if requested.
    value: ${{ steps.diff.outputs.report-html }}
  changed:
    description: '"true" when diff mode found at least one modified, added, or removed screen.'
    value: ${{ steps.diff.outputs.changed }}

runs:
  using: composite
  steps:
    - name: Install termbook (release)
      if: inputs.version != 'source'
      shell: bash
      env:
        TERMBOOK_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        os=""
        case "$(uname -s)" in
          Darwin) os=macos ;;
          Linux)  os=linux ;;
          *) echo "termbook action: unsupported OS $(uname -s)" >&2; exit 1 ;;
        esac

        arch=""
        case "$(uname -m)" in
          x86_64|amd64) arch=x86_64 ;;
          arm64|aarch64) arch=arm64 ;;
          *) echo "termbook action: unsupported arch $(uname -m)" >&2; exit 1 ;;
        esac

        version="$TERMBOOK_VERSION"
        if [ "$version" = "latest" ]; then
          version="$(curl -fsSL https://api.github.com/repos/tiulpin/termbook/releases/latest | sed -n 's/.*"tag_name":[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
          [ -n "$version" ] || { echo "termbook action: could not resolve latest version" >&2; exit 1; }
        fi
        version_no_v="${version#v}"

        url="https://github.com/tiulpin/termbook/releases/download/${version}/termbook_${version_no_v}_${os}_${arch}.tar.gz"
        echo "termbook action: downloading $url"

        tmp="$(mktemp -d)"
        curl -fsSL "$url" -o "$tmp/termbook.tar.gz"
        tar -xzf "$tmp/termbook.tar.gz" -C "$tmp"
        install -m 0755 "$tmp/termbook" "${RUNNER_TOOL_CACHE:-/usr/local/bin}/termbook"
        echo "${RUNNER_TOOL_CACHE:-/usr/local/bin}" >> "$GITHUB_PATH"

    - name: Install termbook (source)
      if: inputs.version == 'source'
      uses: actions/setup-go@v5
      with:
        go-version: stable
        cache: true

    - name: Build termbook from source
      if: inputs.version == 'source'
      shell: bash
      env:
        TERMBOOK_SOURCE_PATH: ${{ inputs.source-path }}
      run: |
        set -euo pipefail
        out="${RUNNER_TOOL_CACHE:-/usr/local/bin}/termbook"
        go build -trimpath -ldflags='-s -w -X main.version=source' -o "$out" "$TERMBOOK_SOURCE_PATH"
        chmod 0755 "$out"
        echo "${RUNNER_TOOL_CACHE:-/usr/local/bin}" >> "$GITHUB_PATH"

    - name: Build gallery
      if: inputs.mode == 'build'
      id: build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TERMBOOK_OUTPUT: ${{ inputs.output }}
        TERMBOOK_ONLY: ${{ inputs.only }}
      run: |
        set -euo pipefail
        args=(build -o "$TERMBOOK_OUTPUT")
        if [ -n "$TERMBOOK_ONLY" ]; then
          args+=(--only "$TERMBOOK_ONLY")
        fi
        termbook "${args[@]}"
        echo "path=$TERMBOOK_OUTPUT" >> "$GITHUB_OUTPUT"

    - name: Re-record and diff
      if: inputs.mode == 'diff'
      id: diff
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TERMBOOK_REPORT_MD: ${{ inputs.report-md }}
        TERMBOOK_REPORT_HTML: ${{ inputs.report-html }}
        TERMBOOK_BASELINE: ${{ inputs.baseline }}
        TERMBOOK_BASELINE_REF: ${{ inputs.baseline-ref }}
        TERMBOOK_FAIL: ${{ inputs.fail-on-change }}
      run: |
        set -euo pipefail
        termbook record --all
        args=(diff --quiet --report-md "$TERMBOOK_REPORT_MD")
        if [ -n "$TERMBOOK_REPORT_HTML" ]; then
          args+=(--report-html "$TERMBOOK_REPORT_HTML")
        fi
        if [ -n "$TERMBOOK_BASELINE" ]; then
          args+=(--baseline "$TERMBOOK_BASELINE")
        fi
        if [ -n "$TERMBOOK_BASELINE_REF" ]; then
          args+=(--baseline-ref "$TERMBOOK_BASELINE_REF")
        fi
        rc=0
        termbook "${args[@]}" || rc=$?
        echo "report-md=$TERMBOOK_REPORT_MD" >> "$GITHUB_OUTPUT"
        if [ -n "$TERMBOOK_REPORT_HTML" ]; then
          echo "report-html=$TERMBOOK_REPORT_HTML" >> "$GITHUB_OUTPUT"
        fi
        if [ "$rc" -eq 0 ]; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
          if [ "$TERMBOOK_FAIL" = "true" ]; then
            exit "$rc"
          fi
        fi
